name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: build-and-publish-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BOT_IMAGE: ghcr.io/sleepypandas/discord-latex-bot
  BOT_BASE_IMAGE: ghcr.io/sleepypandas/discord-latex-bot-base
  DASHBOARD_IMAGE: ghcr.io/sleepypandas/discord-latex-bot-dashboard
  BOT_BASE_TAG: py312-texlive

jobs:
  build-and-push-bot-base-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.bot-base
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.BOT_BASE_IMAGE }}:${{ env.BOT_BASE_TAG }}
          cache-from: |
            type=gha,scope=bot-base
            type=registry,ref=${{ env.BOT_BASE_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=bot-base
            type=registry,ref=${{ env.BOT_BASE_IMAGE }}:buildcache,mode=max

      - name: Clean up old bot base images
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: 'discord-latex-bot-base'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: 'true'

  build-and-push-bot-image:
    runs-on: ubuntu-24.04-arm
    needs: build-and-push-bot-base-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            BOT_BASE_IMAGE=${{ env.BOT_BASE_IMAGE }}:${{ env.BOT_BASE_TAG }}
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.BOT_IMAGE }}:latest
          cache-from: |
            type=gha,scope=bot
            type=registry,ref=${{ env.BOT_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=bot
            type=registry,ref=${{ env.BOT_IMAGE }}:buildcache,mode=max

      - name: Clean up old bot images
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: 'discord-latex-bot'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: 'true'

  build-and-push-dashboard-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: monitoring/dashboard/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DASHBOARD_IMAGE }}:latest
          cache-from: |
            type=gha,scope=dashboard
            type=registry,ref=${{ env.DASHBOARD_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=dashboard
            type=registry,ref=${{ env.DASHBOARD_IMAGE }}:buildcache,mode=max

      - name: Clean up old dashboard images
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: 'discord-latex-bot-dashboard'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: 'true'
