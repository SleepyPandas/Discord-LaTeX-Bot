services:
  latex-bot:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file:
      - src/.env
    environment:
      LATEX_COMPILE_DIR: ${LATEX_COMPILE_DIR:-/tmp/latex-bot}
      LATEX_COMPILE_CONCURRENCY: ${LATEX_COMPILE_CONCURRENCY:-3}
      LATEX_MAX_QUEUE: ${LATEX_MAX_QUEUE:-20}
      METRICS_DB_PATH: /data/metrics.db
      TMPDIR: ${TMPDIR:-/tmp/latex-bot}
    working_dir: /app
    tmpfs:
      - /tmp/latex-bot:rw,noexec,nosuid,nodev,size=${LATEX_TMPFS_SIZE:-256m},mode=1777
    volumes:
      - .:/app
      - ./monitoring/data:/data
    mem_limit: ${LATEX_MEM_LIMIT:-768m}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "5"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: monitoring/dashboard/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_SHA: ${GIT_SHA:-unknown}
    platform: linux/arm64
    environment:
      METRICS_DB_PATH: /data/metrics.db
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8081
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
      APP_VERSION: ${APP_VERSION:-unknown}
      BUILD_DATE: ${BUILD_DATE:-unknown}
      GIT_SHA: ${GIT_SHA:-unknown}
      DASHBOARD_GITHUB_REPO: ${DASHBOARD_GITHUB_REPO:-SleepyPandas/Discord-LaTeX-Bot}
      DASHBOARD_GITHUB_BRANCH: ${DASHBOARD_GITHUB_BRANCH:-main}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "8081:8081"
    volumes:
      - ./monitoring/data:/data
    mem_limit: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "5"
    restart: unless-stopped
