services:
  latex-bot:
    image: ghcr.io/sleepypandas/discord-latex-bot:latest
    env_file:
      - .env
    environment:
      LATEX_COMPILE_DIR: ${LATEX_COMPILE_DIR:-/tmp/latex-bot}
      LATEX_COMPILE_CONCURRENCY: ${LATEX_COMPILE_CONCURRENCY:-3}
      LATEX_MAX_QUEUE: ${LATEX_MAX_QUEUE:-20}
      METRICS_DB_PATH: /data/metrics.db
      TMPDIR: ${TMPDIR:-/tmp/latex-bot}
    tmpfs:
      - /tmp/latex-bot:rw,noexec,nosuid,nodev,size=${LATEX_TMPFS_SIZE:-256m},mode=1777
    volumes:
      - ./data:/data
    mem_limit: ${LATEX_MEM_LIMIT:-768m}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "5"
    restart: unless-stopped

  dashboard:
    image: ghcr.io/sleepypandas/discord-latex-bot-dashboard:latest
    environment:
      METRICS_DB_PATH: /data/metrics.db
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8081
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data
    mem_limit: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "5"
    restart: unless-stopped

  watchtower:
    image: nickfedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Watchtower checks every 5 minutes (300 seconds) for new images and cleans up the old ones to save disk space
    command: --interval 300 --cleanup
    restart: unless-stopped
